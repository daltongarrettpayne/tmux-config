# ── Performance ──────────────────────────────────────────────────────────────
set -g escape-time 0       # No delay after ESC (important if you use vim/nvim)
set -g focus-events on

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on            # Scroll with trackpad/mouse, click to focus panes

# ── Copy mode ─────────────────────────────────────────────────────────────────
# Mouse scroll automatically enters copy mode — you can scroll and click-drag
# to select text without knowing any keybindings.
#
# Vi keybindings for power users (optional to learn):
#   prefix + [       enter copy mode manually
#   q                exit copy mode
#   v                start selection
#   y                yank (copy) selection and exit
#   hjkl             move cursor
#   Ctrl+u/d         scroll half page
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
# Note: if on Linux, replace "pbcopy" with "xclip -selection clipboard" or "xsel --clipboard --input"

# ── Splits ────────────────────────────────────────────────────────────────────
# With prefix (Ctrl+b by default):
bind  |  split-window -h -c "#{pane_current_path}"   # prefix + |  → vertical split
bind  -  split-window -v -c "#{pane_current_path}"   # prefix + -  → horizontal split

# Without prefix (Alt/Option key):
bind -n M-|  split-window -h -c "#{pane_current_path}"   # Alt+|  → vertical split
bind -n M-_  split-window -v -c "#{pane_current_path}"   # Alt+-  → horizontal split

# ── Pane navigation (Alt + hjkl, no prefix needed) ───────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Plugins (optional upgrade) ────────────────────────────────────────────────
# Requires TPM (tmux plugin manager). See README for setup instructions.
# Once TPM is installed, uncomment the lines below, then press prefix + I inside
# tmux to install the plugins.
